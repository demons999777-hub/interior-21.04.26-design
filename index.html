<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Рендер-сет интерьера ИЖД · Демидченко А.Н.</title>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --gold: #c8a96e;
    --gold2: #e8c98a;
    --bg: #0c0a08;
    --dur: 700ms;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Georgia', serif;
    color: #fff;
    touch-action: pan-y;
  }

  /* ─── ПРОГРЕСС ─── */
  #progress-track {
    position: fixed; top:0; left:0; right:0; height:2px;
    background: rgba(200,169,110,.12); z-index:500;
  }
  #progress-bar {
    height:100%;
    background: linear-gradient(90deg, var(--gold), var(--gold2));
    width:0%; transition: width .6s ease;
  }

  /* ─── КНИГА ─── */
  #book {
    position: fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
  }

  /* ─── СЛАЙДЫ ─── */
  .slide {
    position: absolute; inset:0;
    display: flex; align-items:center; justify-content:center;
    background: var(--bg);
    opacity: 0;
    pointer-events: none;
    will-change: transform, opacity;
    transition:
      transform var(--dur) cubic-bezier(.77,0,.175,1),
      opacity   var(--dur) cubic-bezier(.77,0,.175,1);
  }
  .slide[data-state="active"] {
    opacity:1; transform:translateX(0); pointer-events:all;
  }
  .slide[data-state="left"] {
    opacity:0; transform:translateX(-100%);
  }
  .slide[data-state="right"] {
    opacity:0; transform:translateX(100%);
  }
  .slide[data-state="hidden-left"]  { opacity:0; transform:translateX(-100%); transition:none; }
  .slide[data-state="hidden-right"] { opacity:0; transform:translateX(100%);  transition:none; }

  .slide canvas {
    display:block;
    max-width:100vw;
    max-height:100vh;
    width:auto; height:auto;
    object-fit:contain;
  }

  /* тень снизу (подпись автора на рендерах) */
  .slide::after {
    content:'';
    position:absolute; left:0; right:0; bottom:0;
    height:90px;
    background: linear-gradient(to top, rgba(12,10,8,.55), transparent);
    pointer-events:none;
  }

  /* ─── СЧЁТЧИК ─── */
  #counter {
    position: fixed;
    top: clamp(12px,2.5vh,26px);
    right: clamp(12px,3vw,36px);
    z-index:400;
    font-size: clamp(10px,1.2vw,13px);
    letter-spacing: .22em;
    text-transform: uppercase;
    color: rgba(200,169,110,.8);
    background: rgba(12,10,8,.6);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(200,169,110,.18);
    border-radius: 20px;
    padding: 5px 15px;
  }

  /* ─── НАВИГАЦИЯ ─── */
  #nav {
    position: fixed;
    bottom: clamp(16px,4vh,40px);
    left:50%; transform:translateX(-50%);
    z-index:400;
    display:flex; align-items:center;
    gap: clamp(10px,2.5vw,28px);
    opacity:0; transition: opacity .5s ease;
  }
  #nav.ready { opacity:1; }

  .btn {
    width:  clamp(40px,5.5vw,56px);
    height: clamp(40px,5.5vw,56px);
    border-radius:50%;
    border: 1.5px solid rgba(200,169,110,.5);
    background: rgba(12,10,8,.65);
    backdrop-filter: blur(14px);
    color: var(--gold);
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition: transform .25s ease, background .25s ease, border-color .25s ease;
    outline:none;
    -webkit-tap-highlight-color: transparent;
    user-select:none;
  }
  .btn:hover { background:rgba(200,169,110,.18); border-color:var(--gold); transform:scale(1.09); }
  .btn:active { transform:scale(.93); }
  .btn:disabled { opacity:.2; cursor:default; transform:none !important; }
  .btn svg { width:clamp(13px,2vw,19px); height:clamp(13px,2vw,19px); }

  /* ─── ТОЧКИ ─── */
  #dots {
    display:flex; align-items:center; gap:7px;
  }
  .dot {
    width:6px; height:6px; border-radius:3px;
    background:rgba(200,169,110,.28);
    border:none; cursor:pointer; outline:none; padding:0;
    transition: all .38s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .dot.on { background:var(--gold); width:20px; }

  /* ─── ЛОАДЕР ─── */
  #loader {
    position:fixed; inset:0;
    background:var(--bg);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    z-index:900;
    transition: opacity .7s ease;
  }
  #loader.done { opacity:0; pointer-events:none; }

  .spin {
    width:46px; height:46px; border-radius:50%;
    border:2px solid rgba(200,169,110,.12);
    border-top-color:var(--gold);
    animation: rot .85s linear infinite;
    margin-bottom:22px;
  }
  @keyframes rot { to { transform:rotate(360deg); } }

  .load-label {
    font-size:12px; letter-spacing:.28em;
    text-transform:uppercase;
    color:rgba(200,169,110,.55);
    margin-bottom:14px;
  }

  .load-bar-wrap {
    width:160px; height:1px;
    background:rgba(200,169,110,.14);
    border-radius:1px; overflow:hidden;
  }
  .load-bar-fill {
    height:100%; width:0%;
    background:var(--gold);
    transition: width .3s ease;
  }

  /* ─── ОШИБКА ─── */
  #err {
    display:none; position:fixed; inset:0;
    background:var(--bg); z-index:800;
    flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:40px;
  }
  #err.show { display:flex; }
  .err-icon { font-size:52px; margin-bottom:20px; }
  .err-title {
    font-size: clamp(15px,2.5vw,20px);
    letter-spacing:.1em; text-transform:uppercase;
    color:var(--gold); margin-bottom:14px;
  }
  .err-body {
    color:rgba(255,255,255,.42);
    font-size:clamp(12px,1.4vw,14px);
    line-height:1.75; max-width:460px;
  }
  .err-body code {
    display:block; margin-top:16px;
    background:rgba(255,255,255,.06);
    border-radius:8px; padding:12px 16px;
    font-size:12px; color:rgba(200,169,110,.7);
    text-align:left; letter-spacing:.03em;
  }

  /* ─── HINT ─── */
  #hint {
    position:fixed;
    top: clamp(12px,2.5vh,26px);
    left: clamp(12px,3vw,36px);
    font-size: clamp(9px,.95vw,11px);
    letter-spacing:.2em; text-transform:uppercase;
    color:rgba(200,169,110,.35); z-index:400;
  }
  @media(max-width:480px){ #hint{display:none;} }
</style>
</head>
<body>

<div id="progress-track"><div id="progress-bar"></div></div>

<!-- ЛОАДЕР -->
<div id="loader">
  <div class="spin"></div>
  <div class="load-label" id="load-label">Загрузка PDF…</div>
  <div class="load-bar-wrap"><div class="load-bar-fill" id="load-fill"></div></div>
</div>

<!-- ОШИБКА -->
<div id="err">
  <div class="err-icon">📄</div>
  <div class="err-title">Файл не найден</div>
  <div class="err-body">
    Положите <b>ИТОГ.pdf</b> рядом с этим HTML и откройте через локальный сервер.
    <code>
      # Python 3<br>
      python -m http.server 8080<br><br>
      # Затем откройте:<br>
      http://localhost:8080
    </code>
  </div>
</div>

<!-- СЧЁТЧИК -->
<div id="counter">— / —</div>
<div id="hint">← свайп →</div>

<!-- КНИГА -->
<div id="book"></div>

<!-- НАВИГАЦИЯ -->
<nav id="nav">
  <button class="btn" id="btn-prev" disabled aria-label="Назад">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </button>
  <div id="dots"></div>
  <button class="btn" id="btn-next" aria-label="Вперёд">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
      <polyline points="9 18 15 12 9 6"/>
    </svg>
  </button>
</nav>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
'use strict';

/* ═══════════════════════════════════════
   НАСТРОЙКА — имя вашего PDF-файла
═══════════════════════════════════════ */
const PDF_FILE = 'ИТОГ.pdf';
/* ═══════════════════════════════════════ */

pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

/* ── DOM ── */
const book      = document.getElementById('book');
const dotsWrap  = document.getElementById('dots');
const counter   = document.getElementById('counter');
const pBar      = document.getElementById('progress-bar');
const nav       = document.getElementById('nav');
const btnPrev   = document.getElementById('btn-prev');
const btnNext   = document.getElementById('btn-next');
const loader    = document.getElementById('loader');
const loadFill  = document.getElementById('load-fill');
const loadLabel = document.getElementById('load-label');
const errBox    = document.getElementById('err');

/* ── STATE ── */
let slides = [];
let dots   = [];
let cur    = 0;
let total  = 0;
let busy   = false;

/* ── SCALE ── */
function calcScale() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  // A4 landscape: 842×595 pt при 72dpi
  const sw = window.innerWidth  / 842;
  const sh = window.innerHeight / 595;
  return Math.min(sw, sh) * 1.45 * dpr;
}

/* ── RENDER ONE PAGE ── */
async function renderPage(pdf, pageNum) {
  const page     = await pdf.getPage(pageNum);
  const scale    = calcScale();
  const viewport = page.getViewport({ scale });

  const canvas = document.createElement('canvas');
  canvas.width  = viewport.width;
  canvas.height = viewport.height;

  // CSS-размер с учётом DPR
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.style.width  = (viewport.width  / dpr) + 'px';
  canvas.style.height = (viewport.height / dpr) + 'px';

  await page.render({
    canvasContext: canvas.getContext('2d'),
    viewport
  }).promise;

  return canvas;
}

/* ── BUILD SLIDES ── */
async function buildBook(pdf) {
  total = pdf.numPages;

  for (let i = 1; i <= total; i++) {
    // обновляем лоадер
    loadLabel.textContent = `Страница ${i} из ${total}…`;
    loadFill.style.width  = Math.round((i / total) * 100) + '%';

    const canvas = await renderPage(pdf, i);

    const slide = document.createElement('div');
    slide.className = 'slide';
    slide.dataset.state = (i === 1) ? 'active' : 'hidden-right';
    slide.appendChild(canvas);
    book.appendChild(slide);
    slides.push(slide);

    // точка
    const dot = document.createElement('button');
    dot.className = 'dot' + (i === 1 ? ' on' : '');
    dot.setAttribute('aria-label', 'Страница ' + i);
    dot.addEventListener('click', () => goTo(i - 1));
    dotsWrap.appendChild(dot);
    dots.push(dot);
  }

  updateUI();
  nav.classList.add('ready');
  loader.classList.add('done');
}

/* ── UI ── */
function updateUI() {
  counter.textContent = `${cur + 1} / ${total}`;
  pBar.style.width    = `${((cur + 1) / total) * 100}%`;
  btnPrev.disabled    = cur === 0;
  btnNext.disabled    = cur === total - 1;
  dots.forEach((d, i) => d.classList.toggle('on', i === cur));
}

/* ── TRANSITION ── */
function goTo(idx) {
  if (busy || idx === cur || idx < 0 || idx >= total) return;
  busy = true;

  const dir = idx > cur ? 1 : -1; // 1=вперёд, -1=назад
  const from = slides[cur];
  const to   = slides[idx];

  // Мгновенно ставим входящий слайд без анимации
  to.dataset.state = dir > 0 ? 'hidden-right' : 'hidden-left';

  // Один кадр задержки, потом запускаем переход
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      from.dataset.state = dir > 0 ? 'left' : 'right';
      to.dataset.state   = 'active';
      cur = idx;
      updateUI();

      setTimeout(() => {
        // Убираем старые слайды подальше (без анимации)
        slides.forEach((s, i) => {
          if (i !== cur) {
            const off = i < cur ? 'hidden-left' : 'hidden-right';
            // выключаем transition временно
            s.style.transition = 'none';
            s.dataset.state = off;
            // включаем обратно через кадр
            requestAnimationFrame(() => { s.style.transition = ''; });
          }
        });
        busy = false;
      }, 750);
    });
  });
}

function next() { goTo(cur + 1); }
function prev() { goTo(cur - 1); }

/* ── КНОПКИ ── */
btnNext.addEventListener('click', next);
btnPrev.addEventListener('click', prev);

/* ── КЛАВИШИ ── */
document.addEventListener('keydown', e => {
  if ([' ','ArrowRight','ArrowDown'].includes(e.key)) { e.preventDefault(); next(); }
  if (['ArrowLeft','ArrowUp'].includes(e.key))        { e.preventDefault(); prev(); }
});

/* ── СВАЙП (touch) ── */
let tx = 0, ty = 0;
document.addEventListener('touchstart', e => {
  tx = e.touches[0].clientX;
  ty = e.touches[0].clientY;
}, { passive:true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50)
    dx < 0 ? next() : prev();
}, { passive:true });

/* ── СВАЙП (mouse drag) ── */
let mx = 0, dragging = false;
document.addEventListener('mousedown', e => { mx = e.clientX; dragging = true; });
document.addEventListener('mousemove', e => { if(dragging && Math.abs(e.clientX-mx)>8) e.preventDefault(); });
document.addEventListener('mouseup',   e => {
  if (!dragging) return;
  const dx = e.clientX - mx;
  if (Math.abs(dx) > 60) dx < 0 ? next() : prev();
  dragging = false;
});

/* ── ЗАГРУЗКА PDF ── */
(async () => {
  try {
    const task = pdfjsLib.getDocument(PDF_FILE);
    task.onProgress = p => {
      if (p.total > 0)
        loadFill.style.width = Math.round((p.loaded / p.total) * 40) + '%';
    };
    const pdf = await task.promise;
    await buildBook(pdf);
  } catch(e) {
    console.error(e);
    loader.classList.add('done');
    errBox.classList.add('show');
  }
})();
</script>
</body>
</html>
